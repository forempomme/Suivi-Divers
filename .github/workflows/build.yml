name: Build APK

on:
  workflow_dispatch:
    inputs:
      note:
        description: 'Note de version (optionnel)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android Build Tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Build React (Vite)
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Apply icon (remplace icônes Capacitor)
        run: |
          RES=android/app/src/main/res
          rm -rf $RES/mipmap-anydpi-v26
          rm -f  $RES/drawable/ic_launcher_foreground.xml
          rm -f  $RES/drawable-v24/ic_launcher_foreground.xml
          declare -A SIZES=(
            [mipmap-mdpi]=48
            [mipmap-hdpi]=72
            [mipmap-xhdpi]=96
            [mipmap-xxhdpi]=144
            [mipmap-xxxhdpi]=192
          )
          for DIR in "${!SIZES[@]}"; do
            S="${SIZES[$DIR]}"
            mkdir -p "$RES/$DIR"
            convert public/icon.png \
              -resize "${S}x${S}^" -gravity center -extent "${S}x${S}" \
              -background white -flatten \
              "$RES/$DIR/ic_launcher.png"
            cp "$RES/$DIR/ic_launcher.png" "$RES/$DIR/ic_launcher_round.png"
          done
          echo "Icônes appliquées"

      - name: Apply status bar theme Mithril-Anneau
        run: |
          RES=android/app/src/main/res
          mkdir -p $RES/values $RES/values-night

          python3 << 'PYEOF'
          path = "android/app/src/main/res/values/styles.xml"
          items = [
            ("android:statusBarColor",                "#F2EDE4"),
            ("android:navigationBarColor",            "#FAF6EF"),
            ("android:windowLightStatusBar",          "true"),
            ("android:windowLightNavigationBar",      "true"),
            ("android:windowDrawsSystemBarBackgrounds","true"),
          ]
          with open(path) as f:
            c = f.read()
          for name, value in items:
            if f'name="{name}"' not in c:
              c = c.replace("</style>",
                f'        <item name="{name}">{value}</item>\n    </style>', 1)
          with open(path, "w") as f:
            f.write(c)
          print("styles.xml clair patché")
          PYEOF

          cat > $RES/values-night/styles.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.DayNight.NoActionBar">
                  <item name="android:statusBarColor">#080B12</item>
                  <item name="android:navigationBarColor">#0B0E18</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:windowLightNavigationBar">false</item>
                  <item name="android:windowDrawsSystemBarBackgrounds">true</item>
              </style>
          </resources>
          XML
          echo "styles.xml sombre créé"

      - name: Configure gradle.properties
        run: |
          cat > android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          org.gradle.parallel=true
          org.gradle.daemon=true
          org.gradle.caching=true
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: Update app name in strings.xml
        run: |
          STRINGS=android/app/src/main/res/values/strings.xml
          if [ -f "$STRINGS" ]; then
            sed -i 's|<string name="app_name">.*</string>|<string name="app_name">Suivi Divers</string>|g' "$STRINGS"
          fi

      - name: Add permissions to AndroidManifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          for PERM in INTERNET RECEIVE_BOOT_COMPLETED POST_NOTIFICATIONS VIBRATE CAMERA; do
            grep -q "android.permission.$PERM" "$MANIFEST" || \
              sed -i "/<application/i\\    <uses-permission android:name=\"android.permission.$PERM\" />" "$MANIFEST"
          done

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/suividivers.jks

      - name: Build signed APK (release)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/app/suividivers.jks" \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
            --warning-mode=none -q

      - name: Rename APK with version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cp android/app/build/outputs/apk/release/app-release.apk "SuiviDivers-v${VERSION}.apk"
          echo "APK_NAME=SuiviDivers-v${VERSION}.apk" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuiviDivers-v${{ env.VERSION }}
          path: ${{ env.APK_NAME }}
          retention-days: 30

      - name: Summary
        run: |
          echo "## APK généré avec succès" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version :** ${{ env.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Téléchargez l'APK dans l'onglet **Actions → Artifacts** de ce workflow." >> $GITHUB_STEP_SUMMARY
