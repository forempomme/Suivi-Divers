name: Générer le Keystore (à exécuter une seule fois)

on:
  workflow_dispatch:
    inputs:
      keystore_password:
        description: 'Mot de passe du keystore (choisissez-en un fort, notez-le !)'
        required: true
      key_alias:
        description: "Alias de la clé"
        required: true
        default: 'suividivers'

jobs:
  generate-keystore:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Générer le keystore
        run: |
          keytool -genkey -v \
            -keystore suividivers.jks \
            -alias "${{ github.event.inputs.key_alias }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ github.event.inputs.keystore_password }}" \
            -keypass  "${{ github.event.inputs.keystore_password }}" \
            -dname "CN=Suivi Divers, OU=App, O=Personal, L=France, S=France, C=FR"

      - name: Afficher la valeur KEYSTORE_BASE64
        run: |
          echo "================================================================"
          echo " COPIEZ la valeur ci-dessous dans GitHub Secret KEYSTORE_BASE64 "
          echo "================================================================"
          base64 -w 0 suividivers.jks
          echo ""
          echo "================================================================"
          echo " Résumé des secrets à créer dans Settings > Secrets > Actions : "
          echo "================================================================"
          echo ""
          echo "  KEYSTORE_BASE64  = (la valeur base64 ci-dessus)"
          echo "  KEYSTORE_PASSWORD = ${{ github.event.inputs.keystore_password }}"
          echo "  KEY_ALIAS         = ${{ github.event.inputs.key_alias }}"
          echo "  KEY_PASSWORD      = ${{ github.event.inputs.keystore_password }}"

      - name: Sauvegarder le keystore (artifact — à télécharger et conserver précieusement)
        uses: actions/upload-artifact@v4
        with:
          name: suividivers-keystore-BACKUP
          path: suividivers.jks
          retention-days: 1
          
